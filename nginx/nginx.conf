# nginx/nginx.conf

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip — compress text assets before sending to clients
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # Max upload size — 25 MB for design previews and product images
    client_max_body_size 25M;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── HTTP server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Common proxy headers — applied to every proxied location
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # ── Django REST API ───────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_read_timeout 120s;   # Allow time for AI generation requests
        }

        # ── Django admin ──────────────────────────────────────────────────────
        location /admin/ {
            proxy_pass http://backend;
            proxy_read_timeout 60s;
        }

        # ── Django static files (admin CSS/JS) ───────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── User-uploaded media (design previews, product images) ─────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── React SPA — all other paths ───────────────────────────────────────
        # The frontend container runs nginx with try_files so unknown paths
        # return index.html and React Router handles client-side routing.
        location / {
            proxy_pass http://frontend;
        }
    }
}
