# .github/workflows/deploy.yml

name: Test & Deploy

on:
  push:
    branches:
      - main

jobs:

  # ── Run test suite ────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       charme_test
          POSTGRES_USER:     charme_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV:        development
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
      DATABASE_URL:      postgres://charme_user:testpassword@localhost:5432/charme_test
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED:        "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: python manage.py test --verbosity=2

  # ── Build images and deploy ───────────────────────────────────────────────────
  deploy:
    name: Build & deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.REGISTRY }}/charme-backend:latest
            ${{ secrets.REGISTRY }}/charme-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.REGISTRY }}/charme-frontend:latest
            ${{ secrets.REGISTRY }}/charme-frontend:${{ github.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/charme

            # Authenticate to registry on the server
            echo "${{ secrets.REGISTRY_PASSWORD }}" | \
              docker login ${{ secrets.REGISTRY }} \
                -u "${{ secrets.REGISTRY_USERNAME }}" \
                --password-stdin

            # Pull new images and restart changed services
            docker compose pull
            docker compose up -d --remove-orphans

            # Run migrations (idempotent — safe to run on every deploy)
            docker compose exec -T backend python manage.py migrate --noinput

            # Collect static files in case templates/admin assets changed
            docker compose exec -T backend python manage.py collectstatic --noinput

            # Remove dangling images to reclaim disk space
            docker image prune -f
